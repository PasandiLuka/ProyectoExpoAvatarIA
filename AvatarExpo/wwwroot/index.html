<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar Expo IA</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        principal: '#990066',
                        textoBeige: 'rgba(245, 245, 220, 0.9)',
                        fondoApp: '#1a1a1a',
                        fondoCentral: '#2a2a35'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/avatar.css" />
    <link rel="icon" type="image/svg+xml" href="imgs/et12.svg" />
    <link href="AvatarExpo.styles.css" rel="stylesheet" />
    <script src="js/camera.js"></script>
    <script src="js/avatarAnim.js"></script>
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&#x1F5D9;</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
